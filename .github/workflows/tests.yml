name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .

  test:
    name: test ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      # The Qt UI/adapter tests run headless; never open a real window on any runner.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install Qt/X11 system libraries (Linux)
        if: runner.os == 'Linux'
        # PySide6's offscreen plugin needs these shared libs; Xvfb gives pynput an X display to
        # import against (its Linux backend connects to $DISPLAY at import time).
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 xvfb
      - run: uv sync
      - name: Run tests (Linux, under Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a uv run pytest -q
      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: uv run pytest -q
